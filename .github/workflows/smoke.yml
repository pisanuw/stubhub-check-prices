name: smoke-test

# Manual only. Proves whether StubHub serves the data to GitHub's datacenter IP
# (vs. blocking it with a bot challenge). No secrets, no email, no Supabase.
on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run scraper (dry-run, bundled Chromium)
        env:
          CHROME_CHANNEL: chromium
          ALERT_DRYRUN: "1"
          HEADLESS: "1"
        run: node scrape.mjs
      - name: Show output
        if: always()
        run: |
          echo "===== scrape.log ====="; cat scrape.log 2>/dev/null || echo "(none)"
          echo "===== prices.csv (head) ====="; head -5 prices.csv 2>/dev/null || echo "(none)"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scrape-output
          path: |
            scrape.log
            prices.csv
            sections.csv
          if-no-files-found: ignore
